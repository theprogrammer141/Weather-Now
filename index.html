<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="css/style.css">
  
  <title>Weather Now</title>
</head>
<body>
  <!-- Header -->
   <header>
    <img src="./assets/images/logo.svg" alt="Logo" aria-label="Logo" id="logo" class="logo"/>

    <div class="units-selector-wrapper">
      <img src="./assets/images/icon-units.svg" alt="Units-Icon" aria-label="Units-Icon" id="units-icon" class="units-icon"/>
      
      <select name="units" id="unit-selector" class="unit-selector" aria-label="Unit-Selector">
        <option value="" selected disabled hidden>Units</option>
        <option value="metric" aria-label="Metric">Metric</option>
        <option value="imperial" aria-label="Imperial">Imperial</option>
      </select>
    </div>
   </header>

   <!-- Main Content -->
   <main class="main" id="main" aria-label="Main-Section">
    <!-- Main Heading -->
     <h1 class="main-heading" id="main-heading" aria-label="Main-Heading">How's the sky looking today?</h1>
    
     <!-- Search bar + button -->
      <form class="search-form" id="search-form" role="search">
        <div class="search-place-container" id="search-place-container" aria-label="Search-Bar-And-Button">
          <img src="./assets/images/icon-search.svg" alt="search-icon" id="search-icon" aria-label="Search-Icon" />
          <input type="search-bar" name="search-bar" class="search-bar" id="search-bar" placeholder="Search for a place..." aria-label="Search-Bar"></input>
        </div>
        <button type="button" name="search-btn" class="search-btn" id="search-btn" aria-label="Search-Button">Search</button>
      </form>
    </main>

    <!-- Weather Details -->
    <section class="weather-details" id="weather-details" aria-label="Weather-Details">
      <!-- Left Column -->
      <div class="weather-details__left"  id="weather-details__left" aria-label="Weather-Details-Left-Column">
        <!-- Current Weather Image -->
        <div class="current-weather" id="current-weather"   aria-label="current-weather">
          <img src="./assets/images/bg-today-large.svg" alt="Current Weather Image" class="current-weather-image" id="current-weather-image" aria-label="current-weather-image" />
        </div>
        <!-- Detail Cards grid -->
        <div class="detail-cards-grid" id="detail-cards-grid" aria-label="Detail-Cards-Grid">
          <div class="card" aria-label="Card">Feels like</div>
          <div class="card" aria-label="Card">Humidity</div>
          <div class="card" aria-label="Card">Wind</div>
          <div class="card" aria-label="Card">Precipitation</div>
        </div>
        <!-- Daily forecast -->
        <h4 class="daily-forecast-heading" id="daily-forecast-heading" aria-label="daily-forecast-heading">Daily Forecast</h4>
        <!-- Daily forecast cards grid -->
        <div class="daily-forecast-cards-grid" id="daily-forecast-cards-grid" aria-label="Daily-Forecast-Cards-Grid">
          <div class="card" aria-label="Card">Mon</div>
          <div class="card" aria-label="Card">Tue</div>
          <div class="card" aria-label="Card">Wed</div>
          <div class="card" aria-label="Card">Thu</div>
          <div class="card" aria-label="Card">Fri</div>
          <div class="card" aria-label="Card">Sat</div>
          <div class="card" aria-label="Card">Sun</div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="weather-details__right" id="weather-details__right" aria-label="Weather-Details-Right-Column">
        <!-- Hourly forecast wrapper -->
        <div class="hourly-forecast-wrapper" id="hourly-forecast-wrapper" aria-label="Hourly-Forecast-Wrapper">
          <!-- Hourly forecast header -->
          <div class="hourly-forecast-header" id="hourly-forecast-header">
            <h4 class="hourly-forecast-heading" id="hourly-forecast-heading">Hourly Forecast</h4>
            <select name="hourly-forecast" id="hourly-forecast-selector" class="hourly-forecast-selector" aria-label="Hourly-Forecast-Selector">
              <option value="Monday" aria-label="Monday" selected>Monday</option>
              <option value="Tuesday" aria-label="Tuesday" >Tuesday</option>
              <option value="Wednesday" aria-label="Wednesday" >Wednesday</option>
              <option value="Thursday" aria-label="Thursday" >Thursday</option>
              <option value="Friday" aria-label="Friday" >Friday</option>
              <option value="Saturday" aria-label="Saturday"  >Saturday</option>
              <option value="Sunday" aria-label="Sunday" >Sunday</option>
            </select>
          </div>
          <!-- Hourly forecast column -->
          <div class="hourly-forecast-column" id="hourly-forecast-column" aria-label="Hourly-Forecast-Column">
            <div class="card" aria-label="Card">12 AM</div>
            <div class="card" aria-label="Card">1 AM</div>
            <div class="card" aria-label="Card">2 AM</div>
            <div class="card" aria-label="Card">3 AM</div>
            <div class="card" aria-label="Card">4 AM</div>
            <div class="card" aria-label="Card">3 PM</div>
            <div class="card" aria-label="Card">5 AM</div>
            <div class="card" aria-label="Card">6 AM</div>
            <div class="card" aria-label="Card">7 AM</div>
            <div class="card" aria-label="Card">8 AM</div>
            <div class="card" aria-label="Card">9 AM</div>
            <div class="card" aria-label="Card">10 AM</div>
            <div class="card" aria-label="Card">11 AM</div>
            <div class="card" aria-label="Card">12 PM</div>
            <div class="card" aria-label="Card">1 PM</div>
            <div class="card" aria-label="Card">2 PM</div>
            <div class="card" aria-label="Card">3 PM</div>
            <div class="card" aria-label="Card">4 PM</div>
            <div class="card" aria-label="Card">5 PM</div>
            <div class="card" aria-label="Card">6 PM</div>
            <div class="card" aria-label="Card">7 PM</div>
            <div class="card" aria-label="Card">8 PM</div>
            <div class="card" aria-label="Card">9 PM</div>
            <div class="card" aria-label="Card">10 PM</div>
            <div class="card" aria-label="Card">11 PM</div>
          </div>
        </div>
      </div>
    </section>

</body>
</html>
